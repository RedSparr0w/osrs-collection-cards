<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OSRS Collection Log | Card Locked</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="app-shell">
      <header class="app-header">
        <h1>OSRS Collection Log | Card Locked</h1>
        <div class="header-controls">
          <button id="task-browser-button" class="task-browser-button" aria-label="Task browser">Tasks</button>
          <div id="task-browser-panel" class="task-browser-panel hidden" aria-label="Task browser panel">
            <div class="task-browser-header">Task Browser</div>
            <div class="task-browser-filters">
              <label for="task-status-filter">Status</label>
              <select id="task-status-filter">
                <option value="all">All</option>
                <option value="incomplete">Incomplete</option>
                <option value="complete">Complete</option>
              </select>
              <label for="task-tier-filter">Tier</label>
              <select id="task-tier-filter">
                <option value="all">All</option>
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
                <option value="elite">Elite</option>
                <option value="master">Master</option>
              </select>
            </div>
            <div class="task-browser-summary">
              <span id="task-browser-summary-viewing" class="task-browser-summary-item"></span>
              <span id="task-browser-summary-incomplete" class="task-browser-summary-item"></span>
              <span id="task-browser-summary-complete" class="task-browser-summary-item"></span>
            </div>
            <div id="task-browser-list" class="task-browser-list"></div>
          </div>
          <button id="settings-button" class="settings-button" aria-label="Settings menu">⚙️</button>
          <div id="settings-menu" class="settings-menu hidden">
            <span class="settings-title">Settings</span>
            <div class="settings-menu-content">
              <button class="menu-item submenu-trigger" id="background-button">Background<span id="background-display" class="menu-display">Yama</span></button>
              <div id="background-submenu" class="settings-menu hidden">
                <span class="settings-title">Background</span>
                <div class="settings-menu-content">
                  <button class="menu-item" data-background="./images/backgrounds/A Kingdom Divided.png">A Kingdom Divided</button>
                  <button class="menu-item" data-background="./images/backgrounds/Christmas.png">Christmas</button>
                  <button class="menu-item" data-background="./images/backgrounds/Default.png">Default</button>
                  <button class="menu-item" data-background="./images/backgrounds/Desert Treasure II - The Fallen Empire.png">Desert Treasure II - The Fallen Empire</button>
                  <button class="menu-item" data-background="./images/backgrounds/Halloween.png">Halloween</button>
                  <button class="menu-item" data-background="./images/backgrounds/Kebos Lowlands.png">Kebos Lowlands</button>
                  <button class="menu-item" data-background="./images/backgrounds/Leagues V Raging Echoes.png">Leagues V Raging Echoes</button>
                  <button class="menu-item" data-background="./images/backgrounds/Nex.png">Nex</button>
                  <button class="menu-item" data-background="./images/backgrounds/Sailing.png">Sailing</button>
                  <button class="menu-item" data-background="./images/backgrounds/Shattered Relics League.png">Shattered Relics League</button>
                  <button class="menu-item" data-background="./images/backgrounds/Sins of the Father.png">Sins of the Father</button>
                  <button class="menu-item" data-background="./images/backgrounds/Song of the Elves.png">Song of the Elves</button>
                  <button class="menu-item" data-background="./images/backgrounds/Tombs of Amascut.png">Tombs of Amascut</button>
                  <button class="menu-item" data-background="./images/backgrounds/Varlamore The Final Dawn.png">Varlamore The Final Dawn</button>
                  <button class="menu-item" data-background="./images/backgrounds/Varlamore The Rising Darkness.png">Varlamore The Rising Darkness</button>
                  <button class="menu-item" data-background="./images/backgrounds/Varlamore.png">Varlamore</button>
                  <button class="menu-item" data-background="./images/backgrounds/While Guthix Sleeps.png">While Guthix Sleeps</button>
                  <button class="menu-item" data-background="./images/backgrounds/Yama.png">Yama</button>
                  <button class="menu-item" data-background="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M/wHwAEBgIApD5fRAAAAABJRU5ErkJggg==">Green screen</button>
                </div>
              </div>
              <button id="logout-button" class="logout-button">Logout</button>
            </div>
          </div>
        </div>
      </header>
      <section id="login" class="login-section" aria-label="Login form">
        <form id="login-form" class="login-form">
          <label for="username">Username:</label>
          <input type="text" id="username" name="username" required>
          <button type="submit">Login</button>
        </form>
      </section>
      <section id="card-grid" class="card-grid" aria-label="Task cards">
        <div class="active-buttons" aria-label="Active task buttons">
          <button id="wiki-button" class="active-button" tabindex="-1">Wiki</button>
          <button id="choose-card-button" class="active-button" tabindex="-1">Choose card</button>
          <button id="discard-button" class="active-button" tabindex="-1">Discard</button>
        </div>
      </section>
    </main>
    <script src="bundle.js"></script>
</body>
</html>
