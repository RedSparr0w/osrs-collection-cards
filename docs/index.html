<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OSRS Collection Log | Card Locked</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="app-shell">
      <header class="app-header">
        <h1>OSRS Collection Log | Card Locked</h1>
        <p id="status-text" class="status-text">TODO: Settings menu here</p>
      </header>
      <section id="login" class="login-section" aria-label="Login form">
        <h1>Login</h2>
        <form id="login-form" class="login-form">
          <label for="username">Username:</label>
          <input type="text" id="username" name="username" required>
          <button type="submit">Login</button>
        </form>
      </section>
      <section id="card-grid" class="card-grid" aria-label="Task cards">
        <div class="active-buttons" aria-label="Active task buttons">
          <button id="wiki-button" class="active-button" tabindex="-1">Wiki</button>
          <button id="choose-card-button" class="active-button" tabindex="-1">Choose card</button>
          <button id="discard-button" class="active-button" tabindex="-1">Discard</button>
        </div>
      </section>
    </main>
    <script src="bundle.js"></script>
</body>
</html>
