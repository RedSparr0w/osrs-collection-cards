<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OSRS Collection Log | Card Locked</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json" />
</head>
<body data-flame-x="0.2" data-flame-y="0.73" data-flame-width="0.02">
    <main class="app-shell">
      <header class="app-header">
        <h1>OSRS Collection Log | Card Locked</h1>
        <div class="header-controls">
          <button id="task-browser-button" class="task-browser-button" aria-label="Task browser">Tasks</button>
          <div id="task-browser-panel" class="task-browser-panel hidden" aria-label="Task browser panel">
            <div class="task-browser-header">Task Browser</div>
            <div class="task-browser-filters">
              <label for="task-status-filter">Status</label>
              <select id="task-status-filter">
                <option value="all">All</option>
                <option value="incomplete">Incomplete</option>
                <option value="complete">Complete</option>
              </select>
              <label for="task-tier-filter">Tier</label>
              <select id="task-tier-filter">
                <option value="all">All</option>
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
                <option value="elite">Elite</option>
                <option value="master">Master</option>
                <option value="pets">Pets</option>
              </select>
            </div>
            <div class="task-browser-summary">
              <span id="task-browser-summary-viewing" class="task-browser-summary-item"></span>
              <span id="task-browser-summary-incomplete" class="task-browser-summary-item"></span>
              <span id="task-browser-summary-complete" class="task-browser-summary-item"></span>
            </div>
            <div id="task-browser-list" class="task-browser-list"></div>
          </div>
          <button id="settings-button" class="settings-button" aria-label="Settings menu">⚙️</button>
          <div id="settings-menu" class="settings-menu hidden">
            <span class="settings-title">Settings</span>
            <div class="settings-menu-content">
              <button class="menu-item submenu-trigger" id="background-button">Background<span id="background-display" class="menu-display">Yama</span></button>
              <div id="background-submenu" class="settings-menu hidden">
                <span class="settings-title">Background</span>
                <div class="settings-menu-content">
                  <button class="menu-item" data-background="./images/backgrounds/A Kingdom Divided.png" data-flame-x="0.17" data-flame-y="0.76" data-flame-width="0.018">A Kingdom Divided</button>
                  <button class="menu-item" data-background="./images/backgrounds/Christmas.png" data-flame-x="0.22" data-flame-y="0.74" data-flame-width="0.019">Christmas</button>
                  <button class="menu-item" data-background="./images/backgrounds/Default.png" data-flame-x="0.19" data-flame-y="0.75" data-flame-width="0.02">Default</button>
                  <button class="menu-item" data-background="./images/backgrounds/Desert Treasure II - The Fallen Empire.png" data-flame-x="0.16" data-flame-y="0.77" data-flame-width="0.018">Desert Treasure II - The Fallen Empire</button>
                  <button class="menu-item" data-background="./images/backgrounds/Halloween.png" data-flame-x="0.21" data-flame-y="0.73" data-flame-width="0.021">Halloween</button>
                  <button class="menu-item" data-background="./images/backgrounds/Kebos Lowlands.png" data-flame-x="0.18" data-flame-y="0.74" data-flame-width="0.02">Kebos Lowlands</button>
                  <button class="menu-item" data-background="./images/backgrounds/Leagues V Raging Echoes.png" data-flame-x="0.23" data-flame-y="0.72" data-flame-width="0.017">Leagues V Raging Echoes</button>
                  <button class="menu-item" data-background="./images/backgrounds/Nex.png" data-flame-x="0.2" data-flame-y="0.74" data-flame-width="0.02">Nex</button>
                  <button class="menu-item" data-background="./images/backgrounds/Sailing.png" data-flame-x="0.24" data-flame-y="0.71" data-flame-width="0.018">Sailing</button>
                  <button class="menu-item" data-background="./images/backgrounds/Shattered Relics League.png" data-flame-x="0.17" data-flame-y="0.75" data-flame-width="0.019">Shattered Relics League</button>
                  <button class="menu-item" data-background="./images/backgrounds/Sins of the Father.png" data-flame-x="0.15" data-flame-y="0.78" data-flame-width="0.018">Sins of the Father</button>
                  <button class="menu-item" data-background="./images/backgrounds/Song of the Elves.png" data-flame-x="0.2" data-flame-y="0.72" data-flame-width="0.02">Song of the Elves</button>
                  <button class="menu-item" data-background="./images/backgrounds/Tombs of Amascut.png" data-flame-x="0.19" data-flame-y="0.76" data-flame-width="0.018">Tombs of Amascut</button>
                  <button class="menu-item" data-background="./images/backgrounds/Varlamore The Final Dawn.png" data-flame-x="0.21" data-flame-y="0.73" data-flame-width="0.02">Varlamore The Final Dawn</button>
                  <button class="menu-item" data-background="./images/backgrounds/Varlamore The Rising Darkness.png" data-flame-x="0.18" data-flame-y="0.74" data-flame-width="0.019">Varlamore The Rising Darkness</button>
                  <button class="menu-item" data-background="./images/backgrounds/Varlamore.png" data-flame-x="0.185" data-flame-y="0.39" data-flame-width="0.115">Varlamore</button>
                  <button class="menu-item" data-background="./images/backgrounds/While Guthix Sleeps.png" data-flame-x="0.22" data-flame-y="0.72" data-flame-width="0.018">While Guthix Sleeps</button>
                  <button class="menu-item" data-background="./images/backgrounds/Yama.png" data-flame-x="0.17" data-flame-y="0.77" data-flame-width="0.021">Yama</button>
                  <button class="menu-item" data-background="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M/wHwAEBgIApD5fRAAAAABJRU5ErkJggg==" data-flame-x="0.2" data-flame-y="0.7" data-flame-width="0.02">Green screen</button>
                </div>
              </div>
              <button id="install" class="install-button" hidden>Install as app</button>
              <button id="logout-button" class="logout-button">Logout</button>
            </div>
          </div>
        </div>
      </header>
      <section id="login" class="login-section" aria-label="Login form">
        <form id="login-form" class="login-form">
          <label for="username">Username:</label>
          <input type="text" id="username" name="username" required>
          <button type="submit">Login</button>
        </form>
        <i style="text-align: center;">For best results ensure you have the WikiSync plugin enabled.<br/>Then open your collection log and click WikiSync up the top right after obtaining any new collection log slots.</i>
      </section>
      <section id="card-grid" class="card-grid" aria-label="Task cards">
        <div class="active-buttons" aria-label="Active task buttons">
          <button id="wiki-button" class="active-button" tabindex="-1">Wiki</button>
          <button id="choose-card-button" class="active-button" tabindex="-1">Choose card</button>
          <button id="discard-button" class="active-button" tabindex="-1">Discard</button>
        </div>
      </section>
    </main>
    <script src="bundle.js"></script>
</body>
</html>
